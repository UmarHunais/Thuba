<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Complete your order at Thuba. Place your order via WhatsApp for fast delivery across Sri Lanka.">
    <title>Checkout | Thuba</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/checkout.css">
</head>
<body>
    <div id="nav-placeholder"></div>
    <div class="container checkout-page" id="checkout-content">
        <div class="checkout-header">
            <h1>Checkout</h1>
            <p>Complete your order details below</p>
        </div>
        <div class="checkout-grid">
            <div class="checkout-form-section">
                <h2>Delivery Information</h2>
                <form id="checkout-form">
                    <div class="form-row">
                        <div class="form-group"><label for="c-name">Full Name</label><input type="text" id="c-name" placeholder="Enter your full name" required></div>
                        <div class="form-group"><label for="c-phone">Phone Number</label><input type="tel" id="c-phone" placeholder="07XXXXXXXX" required></div>
                    </div>
                    <div class="form-group"><label for="c-address">Delivery Address</label><textarea id="c-address" placeholder="Enter your full delivery address" rows="3" required></textarea></div>
                    <div class="form-group"><label for="c-city">City</label><input type="text" id="c-city" placeholder="Colombo" required></div>
                    <button type="submit" class="btn btn-gold btn-lg" style="width:100%;margin-top:var(--space-6)">Place Order via WhatsApp</button>
                    <p style="text-align:center;margin-top:var(--space-4);font-size:var(--text-sm);color:var(--color-taupe)">You will be redirected to WhatsApp to confirm your order</p>
                </form>
            </div>
            <div class="order-summary">
                <h3>Order Summary</h3>
                <div id="summary-items"></div>
                <div class="order-totals">
                    <div class="row"><span>Subtotal</span><span id="summary-subtotal">Rs. 0</span></div>
                    <div class="row"><span>Shipping</span><span>Free</span></div>
                    <div class="row total"><span>Total</span><span id="summary-total">Rs. 0</span></div>
                </div>
            </div>
        </div>
    </div>
    <div id="footer-placeholder"></div>
    <script src="../js/data.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/checkout.js"></script>
</body>
</html>
